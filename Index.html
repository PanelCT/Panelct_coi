<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PanelCT - Scheda COI</title>
</head>

<body>

<h1>PanelCT</h1>
<h2>Scheda COI Olio Extravergine</h2>

<label>Codice campione</label><br>
<input id="campione"><br><br>

<label>Nome assaggiatore</label><br>
<input id="nome"><br><br>

<label>Cognome assaggiatore</label><br>
<input id="cognome"><br><br>

<label>Fruttato</label>
<input type="range" id="fruttato" min="0" max="10" step="0.1"><br>

<label>Amaro</label>
<input type="range" id="amaro" min="0" max="10" step="0.1"><br>

<label>Piccante</label>
<input type="range" id="piccante" min="0" max="10" step="0.1"><br>

<h3>Difetti</h3>

<label>Riscaldo</label>
<input type="range" id="riscaldo" min="0" max="10" step="0.1"><br>

<label>Muffa-Umidità</label>
<input type="range" id="muffa" min="0" max="10" step="0.1"><br>

<label>Morchia</label>
<input type="range" id="morchia" min="0" max="10" step="0.1"><br>

<label>Avvinato-Inacetito</label>
<input type="range" id="avvinato" min="0" max="10" step="0.1"><br>

<label>Metallico</label>
<input type="range" id="metallico" min="0" max="10" step="0.1"><br>

<label>Rancido</label>
<input type="range" id="rancido" min="0" max="10" step="0.1"><br>

<br>

<label>Note</label><br>
<textarea id="note"></textarea>

<br><br>

<button>INVIA SCHEDA</button>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
