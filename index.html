<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PanelCT - Scheda COI</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 18px;
      background: #f4f5f2;
      color: #20231f;
      font-family: Arial, Helvetica, sans-serif;
    }

    .scheda {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 22px;
      background: white;
      border: 1px solid #d6d9d2;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.07);
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: 34px;
    }

    h2 {
      margin: 8px 0 24px;
      text-align: center;
      font-size: 20px;
      font-weight: 600;
    }

    .sezione {
      margin-top: 26px;
      padding-top: 18px;
      border-top: 2px solid #31382f;
    }

    .sezione h3 {
      margin: 0 0 18px;
      text-align: center;
      font-size: 17px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .riga-scala {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) 2fr 46px;
      gap: 10px;
      align-items: center;
      margin-bottom: 18px;
    }

    .riga-scala label {
      font-weight: 600;
      line-height: 1.25;
    }

    input[type="range"] {
      width: 100%;
    }

    .valore {
      min-width: 42px;
      padding: 5px 4px;
      text-align: center;
      border: 1px solid #bfc4bb;
      border-radius: 6px;
      background: #f7f8f5;
      font-weight: bold;
    }

    .campo {
      margin-bottom: 18px;
    }

    .campo > label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      padding: 11px;
      border: 1px solid #9ca397;
      border-radius: 7px;
      background: white;
      font-size: 16px;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .tipo-fruttato {
      display: flex;
      gap: 28px;
      margin: 4px 0 22px;
      padding: 12px;
      border: 1px solid #d4d8d0;
      border-radius: 8px;
      background: #f8f9f6;
    }

    .tipo-fruttato label {
      display: flex;
      gap: 7px;
      align-items: center;
      font-weight: 600;
    }

    .altri-difetti {
      padding: 16px;
      border: 1px solid #d4d8d0;
      border-radius: 9px;
      background: #f8f9f6;
    }

    button {
      width: 100%;
      margin-top: 24px;
      padding: 15px;
      border: 0;
      border-radius: 8px;
      background: #28372a;
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.99);
    }

    @media (max-width: 560px) {
      body {
        padding: 10px;
      }

      .scheda {
        padding: 17px;
      }

      .riga-scala {
        grid-template-columns: 1fr 46px;
      }

      .riga-scala label {
        grid-column: 1 / 3;
      }

      h1 {
        font-size: 30px;
      }
    }
  </style>
</head>

<body>

  <main class="scheda">

    <h1>PanelCT</h1>
    <h2>Scheda di profilo dell’olio vergine di oliva</h2>

    <!-- DIFETTI: stesso ordine della scheda cartacea -->
    <section class="sezione">
      <h3>Intensità di percezione dei difetti</h3>

      <div class="riga-scala">
        <label for="riscaldo">
          Riscaldo / Morchia
        </label>

        <input
          type="range"
          id="riscaldo"
          min="0"
          max="10"
          step="0.1"
          value="0"
        >

        <output class="valore" id="valore-riscaldo">0.0</output>
      </div>

      <div class="riga-scala">
        <label for="muffa">
          Muffa – Umidità – Terra
        </label>

        <input
          type="range"
          id="muffa"
          min="0"
          max="10"
          step="0.1"
          value="0"
        >

        <output class="valore" id="valore-muffa">0.0</output>
      </div>

      <div class="riga-scala">
        <label for="avvinato">
          Avvinato – Inacetito / Acido – Agro
        </label>

        <input
          type="range"
          id="avvinato"
          min="0"
          max="10"
          step="0.1"
          value="0"
        >

        <output class="valore" id="valore-avvinato">0.0</output>
      </div>

      <div class="riga-scala">
        <label for="rancido">
          Rancido
        </label>

        <input
          type="range"
          id="rancido"
          min="0"
          max="10"
          step="0.1"
          value="0"
        >

        <output class="valore" id="valore-rancido">0.0</output>
      </div>

      <div class="altri-difetti">
        <div class="campo">
          <label for="altro_difetto_nome">
            Altri difetti – Precisare
          </label>

          <select id="altro_difetto_nome">
            <option value="">Nessun altro difetto</option>
            <option value="Metallico">Metallico</option>
            <option value="Olive gelate - Legno umido">
              Olive gelate / Legno umido
            </option>
            <option value="Fieno">Fieno</option>
            <option value="Verme">Verme</option>
            <option value="Grossolano">Grossolano</option>
            <option value="Salamoia">Salamoia</option>
            <option value="Cotto o stracotto">Cotto o stracotto</option>
            <option value="Acqua di vegetazione">
              Acqua di vegetazione
            </option>
            <option value="Sparto">Sparto</option>
            <option value="Cetriolo">Cetriolo</option>
            <option value="Lubrificanti">Lubrificanti</option>
            <option value="Altro">Altro</option>
          </select>
        </div>

        <div class="riga-scala">
          <label for="altro_difetto_intensita">
            Intensità dell’altro difetto
          </label>

          <input
            type="range"
            id="altro_difetto_intensita"
            min="0"
            max="10"
            step="0.1"
            value="0"
          >

          <output
            class="valore"
            id="valore-altro-difetto"
          >0.0</output>
        </div>
      </div>
    </section>

    <!-- ATTRIBUTI POSITIVI -->
    <section class="sezione">
      <h3>Intensità di percezione degli attributi positivi</h3>

      <div class="riga-scala">
        <label for="fruttato">
          Fruttato
        </label>

        <input
          type="range"
          id="fruttato"
          min="0"
          max="10"
          step="0.1"
          value="0"
        >

        <output class="valore" id="valore-fruttato">0.0</output>
      </div>

      <div class="campo">
        <label>Tipo di fruttato</label>

        <div class="tipo-fruttato">
          <label>
            <input
              type="radio"
              name="tipo_fruttato"
              value="Verde"
            >
            Verde
          </label>

          <label>
            <input
              type="radio"
              name="tipo_fruttato"
              value="Maturo"
            >
            Maturo
          </label>
        </div>
      </div>

      <div class="riga-scala">
        <label for="amaro">
          Amaro
        </label>

        <input
          type="range"
          id="amaro"
          min="0"
          max="10"
          step="0.1"
          value="0"
        >

        <output class="valore" id="valore-amaro">0.0</output>
      </div>

      <div class="riga-scala">
        <label for="piccante">
          Piccante
        </label>

        <input
          type="range"
          id="piccante"
          min="0"
          max="10"
          step="0.1"
          value="0"
        >

        <output class="valore" id="valore-piccante">0.0</output>
      </div>
    </section>

    <!-- DATI IDENTIFICATIVI: come nella parte finale della scheda -->
    <section class="sezione">
      <h3>Dati della valutazione</h3>

      <div class="campo">
        <label for="nome">Nome dell’assaggiatore</label>
        <input type="text" id="nome" autocomplete="given-name">
      </div>

      <div class="campo">
        <label for="cognome">Cognome dell’assaggiatore</label>
        <input type="text" id="cognome" autocomplete="family-name">
      </div>

      <div class="campo">
        <label for="campione">Codice del campione</label>
        <input type="text" id="campione">
      </div>

      <div class="campo">
        <label for="note">Osservazioni / Note</label>
        <textarea id="note"></textarea>
      </div>
    </section>

    <button id="inviaScheda" type="button">
      INVIA SCHEDA
    </button>

  </main>

  <script>
    const associaValore = (sliderId, outputId) => {
      const slider = document.getElementById(sliderId);
      const output = document.getElementById(outputId);

      const aggiorna = () => {
        output.textContent = Number(slider.value).toFixed(1);
      };

      slider.addEventListener("input", aggiorna);
      aggiorna();
    };

    associaValore("riscaldo", "valore-riscaldo");
    associaValore("muffa", "valore-muffa");
    associaValore("avvinato", "valore-avvinato");
    associaValore("rancido", "valore-rancido");
    associaValore(
      "altro_difetto_intensita",
      "valore-altro-difetto"
    );
    associaValore("fruttato", "valore-fruttato");
    associaValore("amaro", "valore-amaro");
    associaValore("piccante", "valore-piccante");
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>

</body>
</html>
